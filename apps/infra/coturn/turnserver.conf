# Listening
listening-port=3478
fingerprint
use-auth-secret=0

# Static user for MVP
lt-cred-mech
user=repchat:PUT_REAL_STRONG_PASSWORD_HERE

# Server identity
realm=forgebase.ee
server-name=turn.forgebase.ee

# Network
listening-ip=0.0.0.0

# If your home router forwards to the laptop, set external IP to your public IP.
# Replace this with your real public IP later.
external-ip=YOUR_PUBLIC_IP_HERE

# Relay ports (keep this range small for easier router forwarding)
min-port=49160
max-port=49200

# Security / hygiene
no-cli
no-tlsv1
no-tlsv1_1

# Logging
simple-log